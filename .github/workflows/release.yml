name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Check Python syntax
        run: python -m py_compile bookmark_tool.py

      - name: Build EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name "书签导出工具" --icon app_icon.ico --add-data "app_icon.ico;." bookmark_tool.py
          Copy-Item "dist\书签导出工具.exe" "dist\BookmarkExportTool-${{ github.ref_name }}.exe"

      - name: Create SHA256 checksum
        shell: pwsh
        run: |
          $asset = "dist\BookmarkExportTool-${{ github.ref_name }}.exe"
          $hash = Get-FileHash $asset -Algorithm SHA256
          "$($hash.Hash)  BookmarkExportTool-${{ github.ref_name }}.exe" | Set-Content -Encoding ascii "$asset.sha256"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/BookmarkExportTool-${{ github.ref_name }}.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/BookmarkExportTool-${{ github.ref_name }}.exe
            dist/BookmarkExportTool-${{ github.ref_name }}.exe.sha256
